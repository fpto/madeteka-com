                                            alt={img.alt}
                                            loading="lazy"
                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                        />
                                    </div>
                                ))}
                            </div>

                            {/* Location + CTA */}
                            <div className="grid md:grid-cols-2 gap-8 max-w-6xl mx-auto items-stretch">
                                {/* Map */}
                                <div className="relative overflow-hidden rounded-2xl shadow-lg aspect-[4/3] md:aspect-auto">
                                    <iframe
                                        src={MAP_EMBED}
                                        title="Ubicación Madeteka"
                                        className="w-full h-full min-h-[320px] border-0"
                                        loading="lazy"
                                        referrerPolicy="no-referrer-when-downgrade"
                                        allowFullScreen
                                    />
                                </div>

                                {/* Info panel */}
                                <div className="bg-white border border-olive/20 rounded-2xl p-8 md:p-10 flex flex-col">
                                    <div className="flex items-start space-x-3 mb-6">
                                        <div className="text-gold flex-shrink-0 pt-1">
                                            <Icon icon={MapPin} size={22} />
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold tracking-widest uppercase text-olive mb-1">{t.showroom.address_label}</p>
                                            <p className="text-forest text-base md:text-lg leading-relaxed">{t.showroom.address}</p>
                                        </div>
                                    </div>

                                    <a
                                        href={MAP_LINK}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="inline-flex items-center justify-center space-x-2 border border-forest/20 text-forest px-6 py-3 rounded-full font-semibold hover:border-forest hover:bg-forest/5 transition-colors mb-4"
                                    >
                                        <Icon icon={MapPin} size={18} />
                                        <span>{t.showroom.map_cta}</span>
                                    </a>

                                    <a
                                        href={CAL_URL}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="mt-auto inline-flex items-center justify-center space-x-2 bg-gold text-forest px-6 py-4 rounded-full font-semibold hover:bg-forest hover:text-gold transition-colors shadow-md text-lg"
                                    >
                                        <Icon icon={Calendar} size={20} />
                                        <span>{t.showroom.cal_cta}</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="py-20 bg-parchment border-t border-olive/10 relative overflow-hidden">
                        <div className="absolute -right-20 -top-20 w-64 h-64 bg-gold/10 rounded-full blur-3xl"></div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <h2 className="text-3xl md:text-4xl font-light text-forest mb-4">{t.cta.title}</h2>
                            <p className="text-olive mb-10 max-w-xl mx-auto">{t.cta.desc}</p>
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                                <a
                                    href="https://wa.me/50432945241?text=Hola,%20vi%20su%20pagina%20Sobre%20Nosotros.%20Me%20interesa%20una%20puerta."
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="bg-forest text-white px-8 py-4 rounded-full font-semibold hover:bg-mahogany transition-colors shadow-lg flex items-center space-x-3 w-full sm:w-auto justify-center"
                                >
                                    <Icon icon={WhatsAppIcon} size={22} />
                                    <span>{t.cta.wa}</span>
                                </a>
                                <a
                                    href="/cotizar"
                                    className="border-2 border-forest text-forest px-8 py-4 rounded-full font-semibold hover:bg-forest hover:text-white transition-colors flex items-center space-x-3 w-full sm:w-auto justify-center"
                                >
                                    <Icon icon={ArrowRight} size={20} />
                                    <span>{t.cta.quote}</span>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-forest text-parchment/60 py-12 border-t border-parchment/10">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <a href="/" className="w-40">
                                <img
                                    src="/Logos/Logo-Horizontal-Blanco-Madeteka.png"
                                    alt="Madeteka"
                                    className="w-full h-auto brightness-0 invert opacity-90"
                                />
                            </a>

                            <div className="flex space-x-6 text-sm font-medium">
                                <a href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer" className="hover:text-gold transition-colors">Instagram</a>
                                <a href="http://facebook.com/lamadeteka" target="_blank" className="hover:text-gold transition-colors">Facebook</a>
                                <a href="https://wa.me/50432945241" target="_blank" className="hover:text-gold transition-colors">WhatsApp</a>
                            </div>

                            <div className="text-xs text-center md:text-right space-y-1">
                                <p>&copy; {new Date().getFullYear()} Madeteka. {t.footer.rights}</p>
                                <p><span className="font-semibold">{t.footer.office_label}</span> {t.footer.office}</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
