        // Boquete estándar en metros
        const STD_BOQUETE_WIDTH_M = 0.9652;  // 38"
        const STD_BOQUETE_HEIGHT_M = 2.0574; // 81"

        // Conversiones
        const INCH_TO_M = 0.0254;
        const CM_TO_M = 0.01;
        const M_TO_FT = 1 / 0.3048;

        // Precios estándar por tier
        const STANDARD_PRICES = [
            { min: 1, max: 1, price: 30000 },
            { min: 2, max: 5, price: 25000 },
            { min: 6, max: 10, price: 22500 },
            { min: 11, max: Infinity, price: 20000 },
        ];

        // Factores de margen por tier (costo ÷ factor = precio venta)
        const MARGIN_FACTORS = [
            { min: 1, max: 1, factor: 0.5233 },
            { min: 2, max: 5, factor: 0.628 },
            { min: 6, max: 10, factor: 0.698 },
            { min: 11, max: Infinity, factor: 0.785 },
        ];

        function getTier(totalDoors) {
            return STANDARD_PRICES.find(t => totalDoors >= t.min && totalDoors <= t.max) || STANDARD_PRICES[3];
        }

        function getMarginFactor(totalDoors) {
            return (MARGIN_FACTORS.find(t => totalDoors >= t.min && totalDoors <= t.max) || MARGIN_FACTORS[3]).factor;
        }

        function boqueteToMeters(value, unit) {
            if (unit === 'in') return value * INCH_TO_M;
            if (unit === 'cm') return value * CM_TO_M;
            return value;
        }

        function calculateDoorCost(boqueteWidthM, boqueteHeightM) {
            const doorWidthM = boqueteWidthM - 0.0508;
            const doorHeightM = boqueteHeightM - 0.0254;
            const doorWidthFt = doorWidthM * M_TO_FT;
            const doorHeightFt = doorHeightM * M_TO_FT;
            const areaM2 = doorWidthM * doorHeightM;
            const piesTableares = doorWidthFt * doorHeightFt * 2 * 2.25;
            const costoMadera = piesTableares * 100;
            const costoManoObra = 3944 + (679 * areaM2);
            const hardware = 1500;
            const costoTotal = costoMadera + costoManoObra + hardware;

            return {
                doorWidthM,
                doorHeightM,
                doorWidthFt,
                doorHeightFt,
                areaM2,
                piesTableares: Math.round(piesTableares),
                costoMadera: Math.round(costoMadera),
                costoManoObra: Math.round(costoManoObra),
                hardware,
                costoTotal: Math.round(costoTotal),
            };
        }

        function calculateDoorPrice(door, totalDoors) {
            if (door.sizeType === 'standard') {
                return getTier(totalDoors).price;
            }

            const bwM = boqueteToMeters(parseFloat(door.boqueteAncho) || 0, door.unit);
            const bhM = boqueteToMeters(parseFloat(door.boqueteAlto) || 0, door.unit);

            if (bwM <= 0.0508 || bhM <= 0.0254) return 0;

            const cost = calculateDoorCost(bwM, bhM);
            const factor = getMarginFactor(totalDoors);
            const rawPrice = cost.costoTotal / factor;
            return Math.round(rawPrice / 500) * 500; // Redondear a L500
        }

        function getDoorDetails(door) {
            if (door.sizeType === 'standard') {
                return {
                    boqueteWidth: '38" (0.97 m)',
                    boqueteHeight: '81" (2.06 m)',
                    doorWidth: '36" (0.91 m)',
                    doorHeight: '80" (2.03 m)',
                    areaM2: 1.85,
                    piesTableares: 90,
                };
            }

            const bwM = boqueteToMeters(parseFloat(door.boqueteAncho) || 0, door.unit);
            const bhM = boqueteToMeters(parseFloat(door.boqueteAlto) || 0, door.unit);

            if (bwM <= 0.0508 || bhM <= 0.0254) return null;

            const cost = calculateDoorCost(bwM, bhM);
            const unitLabel = door.unit === 'in' ? '"' : ' cm';

            return {
                boqueteWidth: `${door.boqueteAncho}${unitLabel} (${bwM.toFixed(2)} m)`,
                boqueteHeight: `${door.boqueteAlto}${unitLabel} (${bhM.toFixed(2)} m)`,
                doorWidth: `${(cost.doorWidthM / (door.unit === 'in' ? INCH_TO_M : CM_TO_M)).toFixed(1)}${unitLabel} (${cost.doorWidthM.toFixed(2)} m)`,
                doorHeight: `${(cost.doorHeightM / (door.unit === 'in' ? INCH_TO_M : CM_TO_M)).toFixed(1)}${unitLabel} (${cost.doorHeightM.toFixed(2)} m)`,
                areaM2: cost.areaM2.toFixed(2),
                piesTableares: cost.piesTableares,
            };
        }

        function formatLempiras(amount) {

        // ─────────────────────────────────────────────
        // COMPONENTE PRINCIPAL
        // ─────────────────────────────────────────────
        const App = () => {
            const [lang, setLang] = useState('es');
            const [scrolled, setScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const COUNTRY_CODES = [
                { code: '+504', country: '🇭🇳 HN', name: 'Honduras' },
                { code: '+1', country: '🇺🇸 US', name: 'United States' },
                { code: '+52', country: '🇲🇽 MX', name: 'México' },
                { code: '+502', country: '🇬🇹 GT', name: 'Guatemala' },
                { code: '+503', country: '🇸🇻 SV', name: 'El Salvador' },
                { code: '+505', country: '🇳🇮 NI', name: 'Nicaragua' },
                { code: '+506', country: '🇨🇷 CR', name: 'Costa Rica' },
                { code: '+507', country: '🇵🇦 PA', name: 'Panamá' },
                { code: '+57', country: '🇨🇴 CO', name: 'Colombia' },
                { code: '+34', country: '🇪🇸 ES', name: 'España' },
            ];

            const [customer, setCustomer] = useState({ nombre: '', apellido: '', codigoPais: '+504', telefono: '', email: '' });
            const [doors, setDoors] = useState([createDoor()]);
            const [errors, setErrors] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [submitError, setSubmitError] = useState(false);

            const t = text[lang];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            function createDoor() {
                return {
                    id: Date.now() + Math.random(),
                    modelo: '',
                    sizeType: 'standard',
                    unit: 'in',
                    boqueteAncho: '',
                    boqueteAlto: '',
                };
            }

            const totalDoors = doors.length;

            // All doors must have a model selected (and custom sizes filled if applicable)
            const allDoorsComplete = doors.every(d =>
                d.modelo && (
                    d.sizeType === 'standard' ||
                    (d.sizeType === 'custom' && parseFloat(d.boqueteAncho) > 0 && parseFloat(d.boqueteAlto) > 0)
                )
            );

            const doorPrices = useMemo(() => {
                return doors.map(d => calculateDoorPrice(d, totalDoors));
            }, [doors, totalDoors]);

            const totalPrice = useMemo(() => {
                return doorPrices.reduce((sum, p) => sum + p, 0);
            }, [doorPrices]);

            const tierNote = useMemo(() => {
                if (totalDoors <= 1) return t.tier_note_1;
                if (totalDoors <= 5) return t.tier_note_2_5;
                if (totalDoors <= 10) return t.tier_note_6_10;
                return t.tier_note_11;
            }, [totalDoors, t]);

            function updateCustomer(field, value) {
                setCustomer(prev => ({ ...prev, [field]: value }));
                if (errors[field]) {
                    setErrors(prev => { const n = { ...prev }; delete n[field]; return n; });
                }
            }

            function addDoor() {
                setDoors(prev => [...prev, createDoor()]);
            }

            function removeDoor(index) {
                if (doors.length <= 1) return;
                setDoors(prev => prev.filter((_, i) => i !== index));
            }

            function updateDoor(index, field, value) {
                setDoors(prev => prev.map((d, i) => {
                    if (i !== index) return d;
                    const updated = { ...d, [field]: value };
                    // Reset custom fields when switching to standard
                    if (field === 'sizeType' && value === 'standard') {
                        updated.boqueteAncho = '';
                        updated.boqueteAlto = '';
                    }
                    return updated;
                }));
            }

            function validate() {
                const errs = {};
                if (!customer.nombre.trim()) errs.nombre = t.val_required;
                if (!customer.apellido.trim()) errs.apellido = t.val_required;
                if (!customer.telefono.trim()) errs.telefono = t.val_required;
                else if (!/[\d\s\-()]{7,}/.test(customer.telefono)) errs.telefono = t.val_phone;
                if (!customer.email.trim()) errs.email = t.val_required;
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(customer.email)) errs.email = t.val_email;

                if (doors.length === 0) errs.doors = t.val_min_door;

                let doorErrors = false;
                doors.forEach((d, i) => {
                    if (!d.modelo) { errs[`door_${i}_modelo`] = true; doorErrors = true; }
                    if (d.sizeType === 'custom') {
                        const bw = parseFloat(d.boqueteAncho);
                        const bh = parseFloat(d.boqueteAlto);
                        if (!bw || bw <= 0) { errs[`door_${i}_ancho`] = true; doorErrors = true; }
                        if (!bh || bh <= 0) { errs[`door_${i}_alto`] = true; doorErrors = true; }
                    }
                });
                if (doorErrors) errs.doors_detail = t.val_dimensions;

                setErrors(errs);
                return Object.keys(errs).length === 0;
            }

            async function handleSubmit(e) {
                e.preventDefault();
                if (!validate()) return;

                setSubmitting(true);
                setSubmitError(false);

                const payload = {
                    customer: {
                        nombre: customer.nombre.trim(),
                        apellido: customer.apellido.trim(),
                        telefono: `${customer.codigoPais.replace('+', '')}${customer.telefono.trim()}`,
                        email: customer.email.trim(),
                    },
                    doors: doors.map((d, i) => {
                        const details = getDoorDetails(d);
                        const model = DOOR_MODELS.find(m => m.id === d.modelo);
                        return {
                            numero: i + 1,
                            modelo: model ? model.name : d.modelo,
                            sizeType: d.sizeType,
                            boquete: d.sizeType === 'standard'
                                ? '38" × 81"'
                                : `${d.boqueteAncho}${d.unit === 'in' ? '"' : ' cm'} × ${d.boqueteAlto}${d.unit === 'in' ? '"' : ' cm'}`,
                            puerta: details
                                ? `${details.doorWidth} × ${details.doorHeight}`
                                : 'N/A',
                            areaM2: details ? details.areaM2 : 'N/A',
                            precio: doorPrices[i],
                        };
                    }),
                    totalDoors,
                    totalPrice,
                    lang,
                };

                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                    });

                    // Google Apps Script redirects, so we check if we got any response
                    if (response.ok || response.type === 'opaque' || response.redirected) {
                        setSubmitted(true);
                        setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 100);
                    } else {
                        throw new Error('Response not OK');
                    }
                } catch (err) {
                    // For no-cors mode, we can't read the response but the request was sent
                    // If APPS_SCRIPT_URL is configured, assume success
                    if (APPS_SCRIPT_URL !== 'REPLACE_WITH_APPS_SCRIPT_URL') {
                        setSubmitted(true);

                                    type="button"
                                    onClick={() => onUpdate('sizeType', 'custom')}
                                    className={`px-5 py-3 rounded-xl border-2 text-sm font-medium transition-all ${
                                        door.sizeType === 'custom'
                                            ? 'border-gold bg-gold/10 text-forest'
                                            : 'border-olive/20 text-olive hover:border-olive/40'
                                    }`}
                                >
                                    {t.size_custom}
                                </button>
                            </div>
                        </div>

                        {/* Custom Size Fields */}
                        {door.sizeType === 'custom' && (
                            <div className="bg-parchment/50 rounded-xl p-5 border border-olive/10">
                                <p className="text-xs text-olive mb-4">{t.boquete_note}</p>

                                {/* Unit Toggle */}
                                <div className="mb-4">
                                    <label className="block text-xs font-semibold mb-2 text-olive">{t.unit_label}</label>
                                    <div className="inline-flex rounded-lg border border-olive/20 overflow-hidden">
                                        <button
                                            type="button"
                                            onClick={() => onUpdate('unit', 'in')}
                                            className={`px-4 py-2 text-sm font-medium transition-colors ${
                                                door.unit === 'in' ? 'bg-forest text-parchment' : 'bg-white text-olive hover:bg-parchment'
                                            }`}
                                        >
                                            {t.unit_inches}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => onUpdate('unit', 'cm')}
                                            className={`px-4 py-2 text-sm font-medium transition-colors ${
                                                door.unit === 'cm' ? 'bg-forest text-parchment' : 'bg-white text-olive hover:bg-parchment'
                                            }`}
                                        >
                                            {t.unit_cm}
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-semibold mb-1.5">{t.boquete_width} ({door.unit === 'in' ? '"' : 'cm'})</label>
                                        <input
                                            type="number"
                                            step="0.1"
                                            min="0"
                                            value={door.boqueteAncho}
                                            onChange={e => onUpdate('boqueteAncho', e.target.value)}
                                            placeholder={door.unit === 'in' ? '38' : '97'}
                                            className={`w-full px-4 py-3 rounded-xl border ${anchoError ? 'border-red-400 bg-red-50' : 'border-olive/20'} focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold bg-white text-forest placeholder-olive/40`}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold mb-1.5">{t.boquete_height} ({door.unit === 'in' ? '"' : 'cm'})</label>
                                        <input
                                            type="number"
                                            step="0.1"
                                            min="0"
                                            value={door.boqueteAlto}
                                            onChange={e => onUpdate('boqueteAlto', e.target.value)}
                                            placeholder={door.unit === 'in' ? '81' : '206'}
                                            className={`w-full px-4 py-3 rounded-xl border ${altoError ? 'border-red-400 bg-red-50' : 'border-olive/20'} focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold bg-white text-forest placeholder-olive/40`}
                                        />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Price note */}
                    </div>
                </div>
            );
        };

        // ─── RENDER ───
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
