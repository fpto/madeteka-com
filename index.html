                        <div className="absolute inset-0 z-0">
                             <img 
                                src="https://images.unsplash.com/photo-1481277542470-605612bd2d61?q=80&w=2069&auto=format&fit=crop" 
                                alt="Mahogany Door Texture" 
                                className="w-full h-full object-cover"
                                onError={(e) => {e.target.style.display='none'; e.target.parentElement.style.backgroundColor='#2D4221'}}
                            />
                            <div className="absolute inset-0 bg-forest/80 mix-blend-multiply"></div>
                            <div className="absolute inset-0 bg-gradient-to-t from-forest/90 to-transparent"></div>
                        </div>

                        {/* Content */}
                        <div className="relative z-10 container mx-auto px-6 text-center pt-20">
                            <h1 className="text-5xl md:text-7xl font-light text-parchment mb-6 leading-tight fade-in" style={{animationDelay: '0.2s'}}>
                                {t.hero.title}
                            </h1>
                            <p className="text-lg md:text-xl text-parchment/80 max-w-2xl mx-auto mb-10 font-light fade-in" style={{animationDelay: '0.4s'}}>
                                {t.hero.subtitle}
                            </p>
                            <a href="#collection" className="inline-flex items-center space-x-2 bg-gold text-forest px-8 py-4 rounded-full font-semibold hover:bg-white hover:scale-105 transition-all duration-300 fade-in shadow-lg shadow-gold/20" style={{animationDelay: '0.6s'}}>
                                <span>{t.hero.cta}</span>
                                <Icon icon={ChevronRight} size={20} />
                            </a>
                        </div>
                    </header>

                    {/* Values / Philosophy Section */}
                    <section id="philosophy" className="py-24 bg-parchment">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-20">
                                <h2 className="text-3xl md:text-4xl font-light text-forest mb-4">{t.values.title}</h2>
                                <div className="w-16 h-0.5 bg-gold mx-auto"></div>
                            </div>

                            <div className="grid md:grid-cols-3 gap-12">
                                {/* Value 1 */}
                                <a href="#contact" className="group block text-center p-6 border border-transparent hover:border-olive/10 hover:bg-white rounded-2xl transition-all duration-500 cursor-pointer">
                                    <div className="w-14 h-14 mx-auto bg-forest/5 rounded-full flex items-center justify-center text-forest mb-6 group-hover:bg-forest group-hover:text-gold transition-colors">
                                        <Icon icon={Hammer} size={24} />
                                    </div>
                                    <h3 className="text-xl font-semibold mb-3">{t.values.v1_title}</h3>
                                    <p className="text-olive leading-relaxed text-sm md:text-base">
                                        {t.values.v1_desc}
                                    </p>
                                </a>

                                {/* Value 2 */}
                                <a href="#contact" className="group block text-center p-6 border border-transparent hover:border-olive/10 hover:bg-white rounded-2xl transition-all duration-500 cursor-pointer">
                                    <div className="w-14 h-14 mx-auto bg-forest/5 rounded-full flex items-center justify-center text-forest mb-6 group-hover:bg-forest group-hover:text-gold transition-colors">
                                        <Icon icon={ShieldCheck} size={24} />
                                    </div>
                                    <h3 className="text-xl font-semibold mb-3">{t.values.v2_title}</h3>
                                    <p className="text-olive leading-relaxed text-sm md:text-base">
                                        {t.values.v2_desc}
                                    </p>
                                </a>

                                {/* Value 3 */}
                                <a href="#contact" className="group block text-center p-6 border border-transparent hover:border-olive/10 hover:bg-white rounded-2xl transition-all duration-500 cursor-pointer">
                                    <div className="w-14 h-14 mx-auto bg-forest/5 rounded-full flex items-center justify-center text-forest mb-6 group-hover:bg-forest group-hover:text-gold transition-colors">
                                        <Icon icon={Clock} size={24} />
                                    </div>
                                    <h3 className="text-xl font-semibold mb-3">{t.values.v3_desc}</h3>
                                    <p className="text-olive leading-relaxed text-sm md:text-base">
                                        {t.values.v3_desc_text}
                                    </p>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Product Showcase */}
                    <section id="collection" className="py-24 bg-forest text-parchment">
                        <div className="container mx-auto px-6">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16">
                                <div>
                                    <span className="text-gold font-bold tracking-widest text-xs uppercase mb-2 block">{content[lang].nav.collection}</span>
                                    <h2 className="text-3xl md:text-4xl font-light">{t.showcase.title}</h2>
                                </div>
                                <a href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer" className="hidden md:flex items-center space-x-2 text-gold hover:text-white transition-colors mt-4 md:mt-0">
                                    <span>Instagram</span>
                                    <Icon icon={ArrowRight} size={16} />
                                </a>
                            </div>

                            <div className="flex flex-wrap justify-center gap-8">
                                {t.showcase.items.map((item, index) => (
                                    <a href={`./coleccion#modelo-${item.slug}`} key={index} className="group block cursor-pointer w-full md:w-[calc(50%-1rem)] lg:w-[calc(33.33%-2rem)]">
                                        <div className="relative overflow-hidden rounded-lg aspect-[3/4] mb-6">
                                            <img
                                                src={item.img}
                                                alt={item.name}
                                                className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                                onError={(e) => {e.target.style.display='none'; e.target.parentElement.style.backgroundColor='#2D4221'}}
                                            />
                                            <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-colors"></div>
                                        </div>
                                        <h3 className="text-xl font-medium mb-1">{item.name}</h3>
                                        <p className="text-olive text-sm">{item.desc}</p>
                                    </a>
                                ))}
                            </div>

                            <div className="text-center mt-16">
                                <a
                                    href="./coleccion"
                                    className="inline-flex items-center space-x-2 bg-gold text-forest px-8 py-4 rounded-full font-semibold hover:bg-white hover:scale-105 transition-all shadow-lg"
                                >
                                    <span>{t.showcase.cta}</span>
                                    <Icon icon={ArrowRight} size={18} />
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* About Teaser */}
                    <section className="py-16 bg-parchment">
                        <div className="container mx-auto px-6">
                            <a
                                href="./sobre-nosotros"
                                className="group relative block overflow-hidden rounded-2xl max-w-5xl mx-auto shadow-md hover:shadow-xl transition-shadow"
                            >
                                <img
                                    src="./Fotos-Fabricacion/entaller-1.webp"
                                    alt="Taller Madeteka en Olanchito"
                                    className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                    loading="lazy"
                                />
                                <div className="absolute inset-0 bg-gradient-to-r from-forest/90 via-forest/80 to-forest/50"></div>
                                <div className="relative z-10 flex flex-col md:flex-row md:items-center md:justify-between gap-6 p-8 md:p-12">
                                    <div className="max-w-xl">
                                        <span className="text-gold font-bold tracking-widest text-xs uppercase mb-2 block">{t.about_teaser.kicker}</span>
                                        <h3 className="text-2xl md:text-3xl font-light text-parchment mb-3 leading-tight">{t.about_teaser.title}</h3>
                                        <p className="text-parchment/80 text-sm md:text-base leading-relaxed">{t.about_teaser.desc}</p>
                                    </div>
                                    <span className="inline-flex items-center space-x-2 bg-gold text-forest px-6 py-3 rounded-full font-semibold text-sm group-hover:bg-white transition-colors shadow-sm self-start md:self-auto flex-shrink-0">
                                        <span>{t.about_teaser.cta}</span>
                                        <Icon icon={ArrowRight} size={16} />
                                    </span>
                                </div>
                            </a>
                        </div>
                    </section>

                    {/* Pricing Section */}
                    <section id="pricing" className="py-24 bg-parchment">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-16">
                                <span className="text-gold font-bold tracking-widest text-xs uppercase mb-2 block">{t.nav.pricing}</span>
                                <h2 className="text-3xl md:text-4xl font-light text-forest mb-4">{t.pricing.title}</h2>
                                <p className="text-olive">{t.pricing.subtitle}</p>
                                <div className="w-16 h-0.5 bg-gold mx-auto mt-4"></div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 max-w-5xl mx-auto">
                                {t.pricing.tiers.map((tier, index) => (
                                    <a
                                        key={index}
                                        href="#contact"
                                        className={`group flex flex-col items-center text-center p-8 rounded-2xl border transition-all duration-300 hover:scale-105 hover:shadow-xl ${tier.custom ? 'bg-forest text-parchment border-forest' : 'bg-white border-olive/20 hover:border-gold'}`}
                                    >
                                        <p className={`text-xs font-bold tracking-widest uppercase mb-4 ${tier.custom ? 'text-gold' : 'text-olive'}`}>{tier.label}</p>
                                        {tier.originalPrice && <p className="text-sm text-olive/50 line-through mb-1">{tier.originalPrice}</p>}
                                        <p className={`text-2xl md:text-3xl font-semibold mb-1 ${tier.custom ? 'text-parchment' : 'text-forest'}`}>{tier.price}</p>
                                        <p className={`text-xs ${tier.badge ? 'mb-2' : 'mb-6'} ${tier.custom ? 'text-parchment/60' : 'text-olive'}`}>{tier.unit}</p>
                                        {tier.badge && <p className="text-xs font-semibold text-gold mb-6">{tier.badge}</p>}
                                        <span className={`mt-auto inline-block px-5 py-2 rounded-full text-sm font-semibold transition-colors ${tier.custom ? 'bg-gold text-forest group-hover:bg-white' : 'bg-forest/5 text-forest group-hover:bg-forest group-hover:text-parchment'}`}>
                                            {tier.cta}
                                        </span>
                                    </a>
                                ))}
                            </div>

                            <p className="text-center text-olive text-sm mt-10 max-w-xl mx-auto">{t.pricing.includes}</p>
                        </div>
                    </section>

                    {/* FAQ Section */}
                    <section id="faq" className="py-24 bg-forest text-parchment">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-16">
                                <span className="text-gold font-bold tracking-widest text-xs uppercase mb-2 block">{t.nav.faq}</span>
                                <h2 className="text-3xl md:text-4xl font-light mb-4">{t.faq.title}</h2>
                                <div className="w-16 h-0.5 bg-gold mx-auto"></div>
                            </div>

                            <div className="max-w-3xl mx-auto space-y-4">
                                {t.faq.items.map((item, index) => (
                                    <div key={index} className="border border-parchment/20 rounded-xl overflow-hidden">
                                        <button
                                            onClick={() => setOpenFaq(openFaq === index ? null : index)}
                                            className="w-full flex justify-between items-center p-6 text-left hover:bg-parchment/5 transition-colors"
                                        >
                                            <span className="text-lg font-medium pr-4">{item.q}</span>
                                            <Icon icon={ChevronDown} size={20} className={`text-gold flex-shrink-0 transition-transform duration-300 ${openFaq === index ? 'rotate-180' : ''}`} />
                                        </button>
                                        {openFaq === index && (
                                            <div className="px-6 pb-6 text-parchment/80 leading-relaxed">
                                                <p>{item.a}</p>
                                                {item.mapLink && (
                                                    <a href={item.mapLink} target="_blank" rel="noopener noreferrer" className="inline-block mt-3 text-gold hover:text-white transition-colors font-semibold">
                                                        {item.mapLabel} →
                                                    </a>
                                                )}
                                                {item.calLink && (
                                                    <a href={item.calLink} target="_blank" rel="noopener noreferrer" className="inline-block mt-3 text-gold hover:text-white transition-colors font-semibold">
                                                        {item.calLabel} →
                                                    </a>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact / CTA */}
                    <section id="contact" className="py-24 bg-parchment relative overflow-hidden">
                        {/* Decorative Circle */}
                        <div className="absolute -right-20 -top-20 w-64 h-64 bg-gold/10 rounded-full blur-3xl"></div>
                        <div className="absolute -left-20 bottom-0 w-96 h-96 bg-forest/5 rounded-full blur-3xl"></div>

                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <h2 className="text-4xl md:text-5xl font-light text-forest mb-6">{t.cta_section.title}</h2>
                            <div className="max-w-3xl mx-auto mb-10 p-6 md:p-8 bg-white/80 backdrop-blur-sm border border-olive/20 rounded-2xl text-left">
                                <h3 className="text-2xl font-semibold text-forest mb-4 text-center">{t.offer.title}</h3>
                                <ul className="space-y-3 text-olive text-base md:text-lg list-disc pl-6">
                                    {t.offer.items.map((item, index) => (
                                        <li key={index}>{item}</li>
                                    ))}
                                </ul>
                            </div>
                            <p className="text-xl text-olive mb-10 max-w-xl mx-auto">{t.cta_section.desc}</p>
                            
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                                <a
                                    href="https://wa.me/50432945241?text=Hola,%20hola.%20Vi%20su%20pagina.%20Estoy%20interesado%20en%20una%20puerta."
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="bg-forest text-white px-10 py-5 rounded-full font-semibold hover:bg-mahogany transition-colors shadow-lg flex items-center space-x-3 w-full sm:w-auto justify-center text-lg"
                                >
                                    <Icon icon={WhatsAppIcon} size={24} />
                                    <span>{t.cta_section.btn}</span>
                                </a>
                                <a
                                    href="./cotizar"
                                    className="border-2 border-forest text-forest px-10 py-5 rounded-full font-semibold hover:bg-forest hover:text-white transition-colors shadow-lg flex items-center space-x-3 w-full sm:w-auto justify-center text-lg"
                                >
                                    <Icon icon={ArrowRight} size={20} />
                                    <span>{t.cta_section.btn_quote}</span>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-forest text-parchment/60 py-12 border-t border-parchment/10">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="w-40">
                                <img 
                                    src="./Logos/Logo-Horizontal-Blanco-Madeteka.png" 
                                    alt="Madeteka" 
                                    className="w-full h-auto brightness-0 invert opacity-90" 
                                />
                            </div>
                            
                            <div className="flex space-x-6 text-sm font-medium">
                                <a href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer" className="hover:text-gold transition-colors">Instagram</a>
                                <a href="http://facebook.com/lamadeteka" target="_blank" className="hover:text-gold transition-colors">Facebook</a>
                                <a href="https://wa.me/50432945241" target="_blank" className="hover:text-gold transition-colors">WhatsApp</a>
                            </div>

                            <div className="text-xs text-center md:text-right space-y-1">
                                <p>&copy; {new Date().getFullYear()} Madeteka. {t.footer.rights}</p>
                                <p><span className="font-semibold">{t.footer.office_label}</span> {t.footer.office}</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
